<div class="flex flex-col items-center justify-center h-screen bg-gray-900 text-white">

  <h2 class="text-3xl mb-6 font-bold">Login</h2>

  <input [(ngModel)]="email"
         placeholder="Email"
         class="p-2 mb-3 w-64 rounded text-black">

  <input [(ngModel)]="senha"
         type="password"
         placeholder="Senha"
         class="p-2 mb-3 w-64 rounded text-black">

  <button (click)="login()"
          class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700">
    Entrar
  </button>

  <a routerLink="/cadastro" class="mt-4 text-blue-400">
    Criar conta
  </a>

</div>
